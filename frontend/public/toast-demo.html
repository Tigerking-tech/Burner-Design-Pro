<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .animate-slide-in {
      animation: slideIn 0.3s ease-out;
    }
  </style>
</head>
<body class="bg-gray-900 min-h-screen p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-white mb-8">Toast 提示效果预览</h1>
    
    <p class="text-gray-400 mb-8">点击下方按钮查看不同类型的 Toast 提示效果：</p>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <button onclick="showToast('Operation successful!', 'success')" 
              class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
        Success
      </button>
      <button onclick="showToast('Something went wrong.', 'error')" 
              class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
        Error
      </button>
      <button onclick="showToast('Your session has expired. Please log in again.', 'warning')" 
              class="px-4 py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition">
        Warning (Session)
      </button>
      <button onclick="showToast('Here is some information.', 'info')" 
              class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
        Info
      </button>
    </div>
    
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
      <h2 class="text-xl font-semibold text-white mb-4">Session Expired 提示效果</h2>
      <p class="text-gray-400 mb-4">当用户的 access token 过期且 refresh token 也失效时，会显示此提示：</p>
      <div class="relative bg-gray-900 rounded-lg p-8 min-h-[200px] flex items-center justify-center">
        <div class="fixed top-4 right-4 z-[9999] flex flex-col gap-2">
          <div class="px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 min-w-[320px] max-w-md bg-yellow-600 text-white border border-yellow-500">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <span class="flex-1">Your session has expired. Please log in again.</span>
          </div>
        </div>
        <p class="text-gray-500 text-sm">↑ 右上角的黄色警告提示</p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2"></div>

  <script>
    function showToast(message, type) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      const typeStyles = {
        success: 'bg-green-600 text-white border border-green-500',
        error: 'bg-red-600 text-white border border-red-500',
        warning: 'bg-yellow-600 text-white border border-yellow-500',
        info: 'bg-blue-600 text-white border border-blue-500',
      };
      
      const icons = {
        success: '<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>',
        error: '<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>',
        warning: '<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>',
        info: '<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>',
      };
      
      toast.className = `px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 min-w-[280px] max-w-md animate-slide-in ${typeStyles[type]}`;
      toast.innerHTML = `${icons[type]}<span class="flex-1">${message}</span>`;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        toast.style.transition = 'all 0.3s ease-out';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }
  </script>
</body>
</html>
