services:
  - type: web
    name: burner-design-pro-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: RATE_LIMIT
        value: 100
      - key: RATE_WINDOW
        value: 60
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CREEM_API_KEY
        sync: false
      - key: CREEM_TEST_MODE
        value: false
      - key: CREEM_PRO_PRODUCT_ID
        sync: false
      - key: CREEM_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULL_NAME
        sync: false
      - key: DB_PATH
        value: /var/data/app.db

  - type: disk
    name: api-data-disk
    mountPath: /var/data
    sizeGB: 1
    plan: free
